  <!-- PROCESSOR -->
  <g transform="translate(720 390)"><circle class="processor-ring ring-a" cx="0" cy="0" r="172"/><circle class="processor-ring ring-b" cx="0" cy="0" r="145"/><circle class="processor-ring ring-c" cx="0" cy="0" r="120"/><g><line class="processor-pin" x1="-118" y1="-48" x2="-151" y2="-48"/><line class="processor-pin" x1="-118" y1="-24" x2="-151" y2="-24"/><line class="processor-pin" x1="-118" y1="0" x2="-151" y2="0"/><line class="processor-pin" x1="-118" y1="24" x2="-151" y2="24"/><line class="processor-pin" x1="-118" y1="48" x2="-151" y2="48"/><line class="processor-pin" x1="118" y1="-48" x2="151" y2="-48"/><line class="processor-pin" x1="118" y1="-24" x2="151" y2="-24"/><line class="processor-pin" x1="118" y1="0" x2="151" y2="0"/><line class="processor-pin" x1="118" y1="24" x2="151" y2="24"/><line class="processor-pin" x1="118" y1="48" x2="151" y2="48"/><line class="processor-pin" x1="-48" y1="-118" x2="-48" y2="-151"/><line class="processor-pin" x1="-24" y1="-118" x2="-24" y2="-151"/><line class="processor-pin" x1="0" y1="-118" x2="0" y2="-151"/><line class="processor-pin" x1="24" y1="-118" x2="24" y2="-151"/><line class="processor-pin" x1="48" y1="-118" x2="48" y2="-151"/><line class="processor-pin" x1="-48" y1="118" x2="-48" y2="151"/><line class="processor-pin" x1="-24" y1="118" x2="-24" y2="151"/><line class="processor-pin" x1="0" y1="118" x2="0" y2="151"/><line class="processor-pin" x1="24" y1="118" x2="24" y2="151"/><line class="processor-pin" x1="48" y1="118" x2="48" y2="151"/></g><rect class="processor-body" x="-110" y="-110" width="220" height="220" rx="26"/><rect class="processor-inner" x="-84" y="-84" width="168" height="168" rx="20"/><rect class="processor-core" x="-59" y="-59" width="118" height="118" rx="15"/><g class="processor-grid">
      <path d="M0 -30 C-8 -36 -19 -37 -28 -31 C-36 -26 -39 -17 -36 -8 C-42 -2 -42 10 -35 17 C-33 28 -23 35 -12 33 C-5 37 5 37 12 33 C23 35 33 28 35 17 C42 10 42 -2 36 -8 C39 -17 36 -26 28 -31 C19 -37 8 -36 0 -30 Z"/>
