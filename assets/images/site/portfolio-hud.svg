<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 88 1465 618" role="img" aria-labelledby="title desc" class="portfolio-hud">
  <title id="title">Interactive AI and data capability HUD</title>
  <desc id="desc">Ten capability cards connected to a central processor. Hovering a card animates its line and glow.</desc>
  <defs>
    <linearGradient id="chipFill" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#030712"/><stop offset="100%" stop-color="#0a1520"/></linearGradient>
    <linearGradient id="activeStroke" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#52a8b8"/><stop offset="100%" stop-color="#86cfe0"/></linearGradient>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="7" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .portfolio-hud{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:visible}.card-group{cursor:pointer;outline:none}.connector-base,.connector-active{fill:none;stroke-linecap:round;stroke-linejoin:round}.connector-base{stroke:#52a8b8;stroke-opacity:.22;stroke-width:2}.connector-active{stroke:url(#activeStroke);stroke-width:3;stroke-dasharray:100;stroke-dashoffset:100;opacity:0;filter:url(#glow);transition:stroke-dashoffset .62s ease,opacity .22s ease}.card{fill:none;stroke:rgba(82,168,184,.38);stroke-width:2;transition:fill .25s ease,stroke .25s ease,filter .25s ease,transform .25s ease;transform-box:fill-box;transform-origin:center}.icon{fill:none;stroke:#62b5c8;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;transition:stroke .25s ease,filter .25s ease}.label{fill:rgba(255,255,255,.92);font-family:Inter,Arial,sans-serif;font-size:26px;font-weight:600;letter-spacing:0;dominant-baseline:middle;text-rendering:geometricPrecision;shape-rendering:geometricPrecision;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}.node{fill:#62b5c8;opacity:.48;transition:opacity .2s ease,transform .2s ease,filter .2s ease;transform-box:fill-box;transform-origin:center}.card-group:hover .connector-active,.card-group:focus-visible .connector-active{stroke-dashoffset:0;opacity:1}.card-group:hover .card,.card-group:focus-visible .card{fill:none;stroke:#6bbecf;filter:url(#glow);transform:translateY(-2px)}.card-group:hover .icon,.card-group:focus-visible .icon{stroke:#86cfe0;filter:url(#glow)}.card-group:hover .node,.card-group:focus-visible .node{opacity:.88;filter:url(#glow);transform:scale(1.22)}.processor-ring{fill:none;stroke:#52a8b8;stroke-opacity:.16;transform-box:fill-box;transform-origin:center}.ring-a{stroke-width:2;stroke-dasharray:14 12;animation:spin 22s linear infinite}.ring-b{stroke-width:1.5;stroke-dasharray:5 12;animation:spinReverse 17s linear infinite}.ring-c{stroke-width:1.2;stroke-dasharray:3 10}.processor-body{fill:none;stroke:#52a8b8;stroke-width:3;filter:url(#softGlow)}.processor-inner{fill:none;stroke:rgba(82,168,184,.62);stroke-width:2}.processor-core{fill:none;stroke:#6bbecf;stroke-width:2;filter:url(#glow)}.processor-grid{fill:none;stroke:#62b5c8;stroke-opacity:.58;stroke-width:1.5}.processor-pin{stroke:#52a8b8;stroke-opacity:.62;stroke-width:4;stroke-linecap:round}.neural-cluster{opacity:.28;pointer-events:none;transform-box:fill-box;transform-origin:center;will-change:transform}.neural-line{fill:none;stroke:#52a8b8;stroke-opacity:.42;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round}.neural-dot{fill:#6bbecf;filter:url(#glow)}.neural-core{fill:none;stroke:#62b5c8;stroke-opacity:.52;stroke-width:1.2}.pulse-soft{animation:pulseSoft 4.6s ease-in-out infinite}@keyframes spin{to{transform:rotate(360deg)}}@keyframes spinReverse{to{transform:rotate(-360deg)}}@keyframes pulseSoft{0%,100%{opacity:.18}50%{opacity:.32}}@media (prefers-reduced-motion:reduce){.ring-a,.ring-b{animation:none!important}.pulse-soft{animation:none!important;opacity:.24}.neural-cluster{opacity:.22}}
    </style>
  </defs>

