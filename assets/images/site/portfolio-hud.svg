  <script><![CDATA[
    (() => {
      const svg = document.currentScript.ownerSVGElement;
      const clusters = [...svg.querySelectorAll('.neural-cluster')];
      const cursor = { x: -9999, y: -9999, active: false };
      const bounds = { minX: 520, maxX: 920, minY: 120, maxY: 650 };

      const states = clusters.map((el, index) => {
        const box = el.getBBox();
        const baseX = box.x + box.width / 2;
        const baseY = box.y + box.height / 2;
        const angle = (index * 2.3999632297) % (Math.PI * 2);
        const speed = 0.0013 + (index % 4) * 0.00035;

        return {
          el,
          baseX,
          baseY,
          x: Math.max(bounds.minX, Math.min(bounds.maxX, baseX)),
          y: Math.max(bounds.minY, Math.min(bounds.maxY, baseY)),
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          phase: index * 0.87,
          repelX: 0,
          repelY: 0,
          targetRepelX: 0,
          targetRepelY: 0
        };
      });

      const toSvgPoint = (event) => {
        const point = svg.createSVGPoint();
        point.x = event.clientX;
        point.y = event.clientY;
        return point.matrixTransform(svg.getScreenCTM().inverse());
      };

      svg.addEventListener('pointermove', (event) => {
        const point = toSvgPoint(event);
        cursor.x = point.x;
        cursor.y = point.y;
        cursor.active = true;
      });

      svg.addEventListener('pointerleave', () => {
        cursor.active = false;
      });

      let previousTime = performance.now();

      const animate = (time) => {
        const delta = Math.min(34, time - previousTime);
        previousTime = time;

        states.forEach((state, index) => {
          const waveX = Math.sin(time * 0.00018 + state.phase) * 0.00035;
          const waveY = Math.cos(time * 0.00016 + state.phase * 1.12) * 0.00035;

          state.vx += waveX;
          state.vy += waveY;

          const maxSpeed = 0.0065;
          const currentSpeed = Math.hypot(state.vx, state.vy) || 1;
          if (currentSpeed > maxSpeed) {
            state.vx = (state.vx / currentSpeed) * maxSpeed;
            state.vy = (state.vy / currentSpeed) * maxSpeed;
          }

          state.x += state.vx * delta;
          state.y += state.vy * delta;

          if (state.x < bounds.minX || state.x > bounds.maxX) {
            state.vx *= -1;
            state.x = Math.max(bounds.minX, Math.min(bounds.maxX, state.x));
          }

          if (state.y < bounds.minY || state.y > bounds.maxY) {
            state.vy *= -1;
            state.y = Math.max(bounds.minY, Math.min(bounds.maxY, state.y));
          }

          state.targetRepelX = 0;
          state.targetRepelY = 0;

          if (cursor.active) {
            const dx = state.x - cursor.x;
            const dy = state.y - cursor.y;
            const distance = Math.hypot(dx, dy) || 1;
            const influenceRadius = 175;

            if (distance < influenceRadius) {
              const force = Math.pow((influenceRadius - distance) / influenceRadius, 1.35) * 58;
              state.targetRepelX = (dx / distance) * force;
              state.targetRepelY = (dy / distance) * force;
            }
          }

          state.repelX += (state.targetRepelX - state.repelX) * 0.08;
          state.repelY += (state.targetRepelY - state.repelY) * 0.08;

          const translateX = state.x - state.baseX + state.repelX;
          const translateY = state.y - state.baseY + state.repelY;
          state.el.style.transform = `translate(${translateX.toFixed(2)}px, ${translateY.toFixed(2)}px)`;
        });

        requestAnimationFrame(animate);
      };

      requestAnimationFrame(animate);
    })();
  ]]></script>
</svg>
